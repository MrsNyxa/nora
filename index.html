<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alfred</title>

<style>

body{
background:#ffb6d9;
font-family:Arial;
text-align:center;
margin-top:120px;
overflow:hidden;
color:#5a0033;
}

h1{
font-size:40px;
}

button{
padding:12px 25px;
font-size:20px;
margin:15px;
border:none;
border-radius:12px;
cursor:pointer;
}

#yes{
background:#ff4da6;
color:white;
}

#no{
background:#888;
color:white;
position:relative;
}

.heart{
position:absolute;
font-size:30px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

</style>
</head>

<body>

<h1 id="text">Askim... sana küçük bir şey hazırladım 💙</h1>

<div id="buttons">
<button id="yes">EVET</button>
<button id="no">HAYIR</button>
</div>

<script>

function spawnHeart(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💙";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},6000);
}

setInterval(spawnHeart,400);

let stage=1;
let noAttempts=0;

let noButton=document.getElementById("no");

function resetNoButton(){
noButton.style.position="relative";
noButton.style.left="0px";
noButton.style.top="0px";
}

document.getElementById("yes").onclick=function(){

if(stage===1){

document.getElementById("text").innerHTML=
"Seni gerçekten çok seviyorum... 💙<br><br>" +
"Belki bu küçük site saçma gelebilir ama senin için yaptım. Umarım beğenirsin. <br><br>" +
"Sende beni seviyor musun?";

resetNoButton();
stage=2;

}else if(stage===2){

document.getElementById("text").innerHTML=
"Gerçekten mi? 🥺<br><br>" +
"Bunu duyduğuma çok sevindim...<br><br>" +
"Son bir şey soracağım...<br><br>" +
"Benimle kalmaya devam edecek misin?";

resetNoButton();
stage=3;

}else{

document.body.innerHTML=
"<h1>TEŞEKKÜR EDERİM ASKİM</h1>"+
"<h2>Beni dünyanın en mutlu eniği yaptın 🥹</h2>"+
"<br><br>"+
"<img src='https://media.tenor.com/bkym6hG7pZcAAAAi/love-cat.gif' width='220'>";
}

}

noButton.onmouseover=function(){

if(noAttempts<3){

let x=Math.random()*window.innerWidth-100;
let y=Math.random()*window.innerHeight-50;

noButton.style.position="absolute";
noButton.style.left=x+"px";
noButton.style.top=y+"px";

}

}

noButton.onclick=function(){

noAttempts++;

if(noAttempts>=4){

document.getElementById("text").innerHTML=
"Ya üzülürüm ama...<br><br>" +
"Bu siteyi senin için yaptım tüm gece uğraştım.<br><br>" +
"Lütfen EVET'e bas... ";

noButton.style.display="none";

}

}

</script>

</body>
</html>
